server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 1024m;

  proxy_connect_timeout 10s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;

  set $cors_origin $http_origin;

  location = /__cors_preflight__ {
    internal;
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "authorization, apikey, content-type, x-client-info, x-upsert, prefer, accept-profile, content-profile, range, x-requested-with" always;
    add_header Access-Control-Max-Age 86400 always;
    add_header Content-Length 0 always;
    return 204;
  }

  location /auth/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    if ($request_method = OPTIONS) { rewrite ^ /__cors_preflight__ last; }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Expose-Headers "content-range, x-supabase-api-version, x-request-id, location" always;
    proxy_pass http://host.docker.internal:8000/auth/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /rest/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    if ($request_method = OPTIONS) { rewrite ^ /__cors_preflight__ last; }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Expose-Headers "content-range, x-supabase-api-version, x-request-id, location" always;
    proxy_pass http://host.docker.internal:8000/rest/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /storage/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    if ($request_method = OPTIONS) { rewrite ^ /__cors_preflight__ last; }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Expose-Headers "content-range, x-supabase-api-version, x-request-id, location" always;
    proxy_pass http://host.docker.internal:8000/storage/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Upsert $http_x_upsert;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /functions/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    if ($request_method = OPTIONS) { rewrite ^ /__cors_preflight__ last; }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Expose-Headers "content-range, x-supabase-api-version, x-request-id, location" always;
    proxy_pass http://host.docker.internal:8000/functions/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /realtime/v1/ {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    if ($request_method = OPTIONS) { rewrite ^ /__cors_preflight__ last; }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Vary Origin always;
    add_header Access-Control-Expose-Headers "content-range, x-supabase-api-version, x-request-id, location" always;
    proxy_pass http://host.docker.internal:8000/realtime/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
