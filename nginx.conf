server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  proxy_connect_timeout 10s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;

  location /auth/v1/ {
    proxy_pass http://host.docker.internal:8000/auth/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /rest/v1/ {
    proxy_pass http://host.docker.internal:8000/rest/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /storage/v1/ {
    proxy_pass http://host.docker.internal:8000/storage/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /functions/v1/ {
    proxy_pass http://host.docker.internal:8000/functions/v1/;
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /realtime/v1/ {
    proxy_pass http://host.docker.internal:8000/realtime/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
    proxy_set_header X-Client-Info $http_x_client_info;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
